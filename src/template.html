<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?{{GOOGLE_FONTS}}" rel="stylesheet">
  <style>
:root {
{{THEME_VARS}}
}
{{CORE_CSS}}
  </style>
</head>
<body>
  <div class="stage">
    <div class="deck">
      <div class="progress" id="progress"></div>
      {{CHROME}}
      <div class="slide-number"><span id="num-cur">1</span> / <span id="num-tot">1</span></div>
{{SLIDES}}
    </div>
  </div>

  <nav class="nav">
    <button id="btn-prev" onclick="deckPrev()" title="Previous (←)">&#8592;</button>
    <span class="counter"><b id="nav-cur">1</b> / {{TOTAL}}</span>
    <button id="btn-next" onclick="deckNext()" title="Next (→)">&#8594;</button>
    <button class="tool" onclick="deckPresenter()" title="Presenter view (P)">NOTES</button>
    <button class="tool" onclick="deckPrint()" title="Export PDF">PDF</button>
    <button class="tool" onclick="deckPPTX()" title="Export PPTX">PPTX</button>
  </nav>
  <div class="hint"><kbd>←</kbd><kbd>→</kbd> move · <kbd>P</kbd> notes · <kbd>F</kbd> fullscreen</div>

  <div class="presenter" id="presenter">
    <div class="pv-main">
      <div class="pv-label">Current slide</div>
      <div class="pv-now slide-inner" id="pv-now"></div>
    </div>
    <div class="pv-side">
      <div>
        <div class="pv-label">Timer</div>
        <div class="pv-timer" id="pv-timer">00:00</div>
        <div class="pv-clock" id="pv-clock"></div>
        <div class="pv-btns" style="margin-top:10px;">
          <button onclick="deckTimer.toggle()">Start / Pause</button>
          <button onclick="deckTimer.reset()">Reset</button>
          <button onclick="deckPresenter()">Close (P)</button>
        </div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:8px;overflow:hidden;">
        <div class="pv-label">Speaker notes</div>
        <div class="pv-note" id="pv-note" style="flex:1;overflow-y:auto;"></div>
      </div>
      <div class="pv-next" id="pv-next"></div>
    </div>
  </div>

  <script>
{{CORE_JS}}
  </script>
</body>
</html>
